name: Static Site CI
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
permissions:
  contents: write
  pages: write
jobs:
  site:
    name: Build status site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
      - name: Build site
        uses: upptime/uptime-monitor@v1.41.8
        with:
          command: "site"
        env:
          GH_PAT: ${{ github.token }}
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: ./site/__sapper__/export
          clean: true
          clean-exclude: |
            CNAME
