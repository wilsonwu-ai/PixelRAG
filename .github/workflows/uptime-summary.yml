name: Summary CI
on:
  schedule:
    # Every 10 min so history/summary.json (the data source for the static
    # status page) stays near-real-time, not just daily.
    - cron: "*/10 * * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  summary:
    name: Generate summary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: status
          token: ${{ secrets.GH_PAT || github.token }}

      # Upptime's built-in `readme` command queries the GitHub Commits API
      # without sha=status, so it reads the default branch (main) and finds
      # no Upptime data — producing an all-"down" summary.  This script
      # reads history/*.yml directly and queries with sha=status.
      - name: Generate summary
        run: node .github/scripts/generate-summary.mjs
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Commit if changed
        run: |
          git config user.name "Upptime Bot"
          git config user.email "upptime@users.noreply.github.com"
          git add history/summary.json
          if git diff --staged --quiet; then
            echo "No changes to summary.json"
          else
            git commit -m "📊 Update status summary [skip ci]"
            git push origin status
          fi
