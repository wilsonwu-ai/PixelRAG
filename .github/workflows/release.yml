name: Release to PyPI

# Publishes every PixelRAG package to PyPI. Auth is a single account-scoped API token
# stored as the `PYPI_API_TOKEN` repo secret (see RELEASING.md). Triggered by publishing
# a GitHub Release (tag like `v0.1.0`), or run manually:
#   - dry_run = true  → build only (no upload)
#   - dry_run = false → build + publish
# `--check-url` makes publishing idempotent: files already on PyPI are skipped, so a
# partial release can be safely re-run.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only, do not publish"
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - pixelrag
          - pixelrag-render
          - pixelrag-embed
          - pixelrag-index
          - pixelrag-serve
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Build ${{ matrix.package }}
        run: uv build --package ${{ matrix.package }} --out-dir dist

      - name: List artifacts
        run: ls -l dist

      - name: Publish ${{ matrix.package }} to PyPI
        if: ${{ github.event_name == 'release' || !inputs.dry_run }}
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish --check-url https://pypi.org/simple/
